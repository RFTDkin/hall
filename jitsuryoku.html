<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>柏青哥模擬器 (eようこそ実力至上主義の教室へ)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #d32f2f; }
        
        .main-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            flex-wrap: wrap;
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .left-panel { flex: 1; min-width: 320px; max-width: 500px; }
        .right-panel { flex: 1; min-width: 320px; max-width: 400px; }

        .stats-board {
            background-color: #1e1e1e;
            border: 2px solid #b71c1c; /* 深紅色主題 */
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-around;
            font-size: 1.1em;
        }
        .stat-item span {
            display: block;
            font-weight: bold;
            color: #ffca28; /* 金色字 */
            font-size: 1.3em;
            margin-top: 5px;
        }
        
        button {
            background-color: #c62828; 
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1.1em;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
            transition: background-color 0.2s;
        }
        button:hover { background-color: #8e0000; }
        button:disabled { background-color: #555; cursor: not-allowed; }
        #btn-reset { background-color: #424242; }
        #btn-reset:hover { background-color: #212121; border: 1px solid #ffca28;}
        
        .log-container {
            background-color: #000000;
            border: 1px solid #333;
            border-radius: 5px;
            height: 400px;
            overflow-y: auto;
            padding: 10px;
            text-align: left;
            font-family: 'Courier New', Courier, monospace;
            line-height: 1.5;
        }
        .log-entry { margin: 5px 0; }
        .color-rush { color: #ffeb3b; font-weight: bold; }
        .color-hit { color: #ff5252; font-weight: bold; }
        .color-normal { color: #b0bec5; }
        .color-lt { color: #ffca28; font-weight: bold; text-shadow: 0 0 5px #ffca28; }

        .data-lamp-container {
            background-color: #111;
            border: 3px solid #444;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 0 15px rgba(183, 28, 28, 0.4); 
        }
        .data-lamp-title {
            color: #d32f2f;
            margin-top: 0;
            margin-bottom: 15px;
            text-align: center;
            font-family: 'Courier New', Courier, monospace;
            text-shadow: 0 0 5px #d32f2f;
            letter-spacing: 2px;
        }
        table.data-lamp {
            width: 100%;
            border-collapse: collapse;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
        }
        table.data-lamp th, table.data-lamp td {
            border: 1px solid #333;
            padding: 10px 5px;
            text-align: center;
        }
        table.data-lamp th { background-color: #222; color: #ffca28; font-size: 0.9em; }
        table.data-lamp tr:nth-child(even) { background-color: #1a1a1a; }
        table.data-lamp td.hit-spins { color: #ff5252; font-weight: bold; }
        table.data-lamp td.hit-rush { color: #00e676; font-weight: bold; }
        table.data-lamp td.hit-payout { color: #ffeb3b; }
        .empty-row { color: #555 !important; }
    </style>
</head>
<body>

    <h1>🎰 柏青哥模擬器 <br><span style="font-size: 0.6em; color: #ffca28;">eようこそ実力至上主義の教室へ</span></h1>
    
    <div class="main-container">
        <div class="left-panel">
            <div class="stats-board">
                <div class="stat-item">當前轉數 <span id="ui-spins">0</span></div>
                <div class="stat-item">本次出玉 <span id="ui-payout">0</span></div>
                <div class="stat-item">本次連莊 <span id="ui-rush">0</span></div>
            </div>

            <div style="margin-bottom: 15px;">
                <button id="btn-play" onclick="startPlay()">▶️ 開始抽機</button>
                <button id="btn-reset" onclick="resetGame()">🔄 紀錄重置</button>
            </div>

            <div class="log-container" id="log-box"></div>
        </div>

        <div class="right-panel">
            <div class="data-lamp-container">
                <h3 class="data-lamp-title">DATA LAMP (最近10次)</h3>
                <table class="data-lamp">
                    <thead>
                        <tr>
                            <th>前次</th>
                            <th>當選回轉數</th>
                            <th>連莊數</th>
                            <th>獲得出玉</th>
                        </tr>
                    </thead>
                    <tbody id="history-tbody">
                        <tr><td colspan="4" class="empty-row">- 無紀錄 -</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const sleep = ms => new Promise(r => setTimeout(r, ms));

        class ClassroomOfTheElite {
            constructor() {
                this.state = "NORMAL";
                this.session_spins = 0;
                this.session_payout = 0;
                this.session_rush_count = 0;
                this.history = [];
            }

            async play_normal() {
                this.session_spins += 1;

                if (this.session_spins % 100 === 0) {
                    addLog(`現在回轉數: ${this.session_spins}`, "color-normal");
                }

                // 通常時 大当り確率 約1/349.9
                if (Math.random() < (1 / 349.9)) {
                    addLog(`\n[${this.session_spins} 回轉] 🔥 よう実BONUS！`, "color-hit");
                    await this.normal_result();
                    return true;
                }
                return false;
            }

            async normal_result() {
                let roll = Math.random();

                // 50% 突入 TREASURE HUNT
                if (roll < 0.50) {
                    let payout = 450; // 3R
                    addLog("🌈 チャレンジ成功！ 450玉 + TREASURE HUNT 突入！", "color-rush");
                    this.session_payout += payout;
                    await this.play_treasure_hunt();
                } 
                // 50% 通常終了
                else {
                    let payout = 450; // 3R
                    addLog("😭 チャレンジ失敗... 450玉 (通常終了)");
                    this.session_payout += payout;
                    addLog(`💰 本次總出玉: ${this.session_payout} 玉`);
                    this.record_history();
                }
                updateUI();
            }

            async play_treasure_hunt() {
                addLog("\n===== 🎯 TREASURE HUNT (ST 65回) 開始 =====", "color-rush");
                this.state = "TREASURE_HUNT";
                updateUI();

                addLog("⏳ ST 消化中...", "color-normal");

                // ST 65回, 確率 1/94.1 (引き戻し率 約50%)
                let hit_spin = 0;
                let hit = false;
                for(let i = 1; i <= 65; i++) {
                    await sleep(30); // 加入延遲模擬轉數跳動
                    document.getElementById("ui-spins").innerText = `ST中: ${i}/65`;
                    
                    if (Math.random() < (1 / 94.1)) {
                        hit = true;
                        hit_spin = i;
                        break;
                    }
                }

                if (hit) {
                    this.session_rush_count += 1;
                    let payout = 3000; // ALL 3000個 (10R×2)
                    this.session_payout += payout;
                    
                    addLog(`\n🎉 [ST ${hit_spin}回転] 大当り！ (總 ${this.session_rush_count + 1}連)`, "color-hit");
                    addLog(`💥 本次獲得: 3000 玉 (10R x 2)`);
                    addLog(`💰 累積出玉: ${this.session_payout} 玉`);
                    updateUI();
                    
                    await sleep(1000);

                    // 大当り時の約73％でLTへ
                    let roll = Math.random();
                    if (roll < 0.73) {
                        addLog("🌈 73% 継続成功！ LT『TREASURE HUNT EXTRA』へ昇格！！", "color-lt");
                        await sleep(1000);
                        await this.play_treasure_hunt_extra();
                    } else {
                        addLog("😭 27% 振り分け... (3000玉獲得して通常へ転落)", "color-normal");
                        this.end_rush();
                    }
                } else {
                    document.getElementById("ui-spins").innerText = `ST中: 65/65`;
                    addLog("\n💀 ST 65回転 スルー... 終了");
                    this.end_rush();
                }
            }

            async play_treasure_hunt_extra() {
                addLog("\n===== 👑 TREASURE HUNT EXTRA (LT ST 145回) 開始 =====", "color-lt");
                this.state = "LT_RUSH";
                updateUI();

                while(this.state === "LT_RUSH") {
                    addLog("⏳ 上位ST 消化中...", "color-normal");

                    // LT ST 145回, 確率 1/71.6 (引き戻し率 約87%)
                    let hit_spin = 0;
                    let hit = false;
                    for(let i = 1; i <= 145; i++) {
                        await sleep(30); // 加入延遲模擬轉數跳動
                        document.getElementById("ui-spins").innerText = `LT中: ${i}/145`;
                        
                        if (Math.random() < (1 / 71.6)) {
                            hit = true;
                            hit_spin = i;
                            break;
                        }
                    }

                    if (hit) {
                        this.session_rush_count += 1;
                        let payout = 3000; // ALL 3000個
                        this.session_payout += payout;
                        
                        addLog(`\n🎉 [ST ${hit_spin}回転] 激熱大当り！ (總 ${this.session_rush_count + 1}連)`, "color-lt");
                        addLog(`💥 本次獲得: 3000 玉 (10R x 2)`);
                        addLog(`💰 累積出玉: ${this.session_payout} 玉`);
                        updateUI();
                        
                        await sleep(1000);

                        // 大当り時の約87％でLT継続
                        let roll = Math.random();
                        if (roll < 0.87) {
                            addLog("⚡ 87% 継続成功！ LT継続！！", "color-lt");
                            // 繼續下一個迴圈
                        } else {
                            addLog("😭 13% 振り分け... (3000玉獲得して通常へ転落)", "color-normal");
                            this.end_rush();
                            break;
                        }
                    } else {
                        document.getElementById("ui-spins").innerText = `LT中: 145/145`;
                        addLog("\n💀 ST 145回転 スルー... 終了");
                        this.end_rush();
                        break;
                    }
                }
            }

            end_rush() {
                addLog(`📈 總連莊數: ${this.session_rush_count + 1}連 (含初當)`);
                addLog(`💰 最終出玉: ${this.session_payout} 玉`);
                this.state = "NORMAL";
                this.record_history();
                updateUI();
            }

            record_history() {
                this.history.unshift({
                    spins: this.session_spins,
                    rush: this.session_rush_count > 0 ? this.session_rush_count + 1 : 1,
                    payout: this.session_payout
                });

                if (this.history.length > 10) this.history.pop();
                renderHistoryTable(this.history);

                this.session_spins = 0;
                this.session_payout = 0;
                this.session_rush_count = 0;
            }
        }

        let game = new ClassroomOfTheElite();
        let isPlaying = false;
        const logBox = document.getElementById("log-box");
        const btnPlay = document.getElementById("btn-play");
        const btnReset = document.getElementById("btn-reset");
        const historyTbody = document.getElementById("history-tbody");

        function addLog(text, className = "") {
            const div = document.createElement("div");
            div.className = `log-entry ${className}`;
            div.innerText = text;
            logBox.appendChild(div);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function updateUI() {
            // 只有喺 NORMAL 狀態先會用左方通常轉數覆蓋 UI，RUSH 時由內部迴圈自行處理顯示
            if (game.state === "NORMAL") {
                document.getElementById("ui-spins").innerText = game.session_spins;
            }
            document.getElementById("ui-payout").innerText = game.session_payout;
            document.getElementById("ui-rush").innerText = game.session_rush_count;
        }

        function renderHistoryTable(historyData) {
            historyTbody.innerHTML = ""; 
            if (historyData.length === 0) {
                historyTbody.innerHTML = `<tr><td colspan="4" class="empty-row">- 無紀錄 -</td></tr>`;
                return;
            }

            historyData.forEach((record, index) => {
                const tr = document.createElement("tr");
                let label = index === 0 ? "前回" : index === 1 ? "前々回" : `${index + 1}回前`;
                tr.innerHTML = `
                    <td>${label}</td>
                    <td class="hit-spins">${record.spins}</td>
                    <td class="hit-rush">${record.rush}</td>
                    <td class="hit-payout">${record.payout}</td>
                `;
                historyTbody.appendChild(tr);
            });
        }

        async function startPlay() {
            if (isPlaying) return;
            isPlaying = true;
            btnPlay.disabled = true;
            btnReset.disabled = true;
            
            addLog("\n=== 開始打玉 ===", "color-hit");

            while (isPlaying) {
                let hit = await game.play_normal();
                updateUI();
                
                if (game.session_spins % 100 === 0) {
                    await sleep(10); 
                }

                if (hit) {
                    isPlaying = false;
                    break;
                }
            }
            
            btnPlay.disabled = false;
            btnReset.disabled = false;
            btnPlay.innerText = "▶️ 繼續抽機";
        }

        function resetGame() {
            game = new ClassroomOfTheElite();
            logBox.innerHTML = "";
            renderHistoryTable([]);
            updateUI();
            addLog("遊戲紀錄已重置。", "color-normal");
            btnPlay.innerText = "▶️ 開始抽機";
        }
    </script>
    <script src="plugin.js"></script>
</body>
</html>
