<!DOCTYPE html>
<html lang="zh-HK">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>柏青哥模擬器 (P 東京喰種 999ver)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d0000;
            color: #eeeeee;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #d50000;
            text-shadow: 0 0 15px rgba(213, 0, 0, 0.7);
            font-weight: 900;
            letter-spacing: 2px;
        }

        .main-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            flex-wrap: wrap;
            max-width: 1000px;
            margin: 0 auto;
        }

        .left-panel {
            flex: 1;
            min-width: 320px;
            max-width: 500px;
        }

        .right-panel {
            flex: 1;
            min-width: 320px;
            max-width: 400px;
        }

        .stats-board {
            background-color: #1a0000;
            border: 2px solid #d50000;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-around;
            font-size: 1.1em;
            box-shadow: inset 0 0 15px rgba(213, 0, 0, 0.5);
        }

        .stat-item span {
            display: block;
            font-weight: bold;
            color: #ff5252;
            font-size: 1.3em;
            margin-top: 5px;
        }

        button {
            background-color: #b71c1c;
            color: white;
            border: 1px solid #d50000;
            padding: 12px 25px;
            font-size: 1.1em;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
            transition: background-color 0.2s, transform 0.1s, box-shadow 0.2s;
        }

        button:hover {
            background-color: #f44336;
            transform: scale(1.05);
            box-shadow: 0 0 10px #d50000;
        }

        button:disabled {
            background-color: #3e2723;
            border-color: #444;
            color: #777;
            cursor: not-allowed;
            transform: scale(1);
            box-shadow: none;
        }

        #btn-reset {
            background-color: #424242;
            border-color: #616161;
        }

        #btn-reset:hover {
            background-color: #212121;
            box-shadow: 0 0 10px #616161;
        }

        .log-container {
            background-color: #000000;
            border: 1px solid #d50000;
            border-radius: 5px;
            height: 400px;
            overflow-y: auto;
            padding: 10px;
            text-align: left;
            font-family: 'Courier New', Courier, monospace;
            line-height: 1.5;
        }

        .log-entry {
            margin: 5px 0;
        }

        .color-rush {
            color: #ffeb3b;
            font-weight: bold;
            text-shadow: 0 0 5px #ffeb3b;
        }

        .color-hit {
            color: #ff5252;
            font-weight: bold;
            text-shadow: 0 0 5px #ff5252;
        }

        .color-normal {
            color: #9e9e9e;
        }

        .color-ultimate {
            color: #d50000;
            font-weight: bold;
            text-shadow: 0 0 15px #d50000;
            font-size: 1.2em;
        }

        .color-charge {
            color: #9c27b0;
            font-weight: bold;
        }

        .color-fall {
            color: #757575;
            font-weight: bold;
        }

        .color-music {
            color: #00e676;
            font-style: italic;
        }

        .data-lamp-container {
            background-color: #110000;
            border: 3px solid #d50000;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 0 20px rgba(213, 0, 0, 0.5);
        }

        .data-lamp-title {
            color: #d50000;
            margin-top: 0;
            margin-bottom: 15px;
            text-align: center;
            font-family: 'Courier New', Courier, monospace;
            text-shadow: 0 0 5px #d50000;
            letter-spacing: 2px;
        }

        table.data-lamp {
            width: 100%;
            border-collapse: collapse;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
        }

        table.data-lamp th,
        table.data-lamp td {
            border: 1px solid #b71c1c;
            padding: 10px 5px;
            text-align: center;
        }

        table.data-lamp th {
            background-color: #3e2723;
            color: #ff8a80;
            font-size: 0.9em;
        }

        table.data-lamp tr:nth-child(even) {
            background-color: #210000;
        }

        table.data-lamp td.hit-spins {
            color: #ffeb3b;
            font-weight: bold;
        }

        table.data-lamp td.hit-rush {
            color: #00e676;
            font-weight: bold;
        }

        table.data-lamp td.hit-payout {
            color: #ff5252;
        }

        .empty-row {
            color: #444 !important;
        }
    </style>
</head>

<body>

    <h1>🎰 柏青哥模擬器 <br><span style="font-size: 0.5em; color: #ffffff;">P 東京喰種 999ver</span></h1>

    <video id="rush-media" src="https://files.catbox.moe/t3rubq.mp4" style="display:none;" preload="auto" playsinline
        webkit-playsinline></video>

    <div class="main-container">
        <div class="left-panel">
            <div class="stats-board">
                <div class="stat-item">當前轉數 <span id="ui-spins">0</span></div>
                <div class="stat-item">本次出玉 <span id="ui-payout">0</span></div>
                <div class="stat-item">本次連莊 <span id="ui-rush">0</span></div>
            </div>

            <div style="margin-bottom: 15px;">
                <button id="btn-play" onclick="startPlay()">▶️ 遊戲開始</button>
                <button id="btn-reset" onclick="resetGame()">🔄 紀錄重置</button>
            </div>

            <div class="log-container" id="log-box"></div>
        </div>

        <div class="right-panel">
            <div class="data-lamp-container">
                <h3 class="data-lamp-title">DATA LAMP (最近10次)</h3>
                <table class="data-lamp">
                    <thead>
                        <tr>
                            <th>前次</th>
                            <th>當選回轉數</th>
                            <th>連莊數</th>
                            <th>獲得出玉</th>
                        </tr>
                    </thead>
                    <tbody id="history-tbody">
                        <tr>
                            <td colspan="4" class="empty-row">- 無紀錄 -</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const sleep = ms => new Promise(r => setTimeout(r, ms));
        const rushMedia = document.getElementById("rush-media");
        let audioUnlocked = false;

        // RUSH中獎時彈出 Rize 影片
        function playVideoPopupAndWait(mediaElement) {
            return new Promise((resolve) => {
                if (!mediaElement) return resolve();

                let isResolved = false;
                const finish = () => {
                    if (isResolved) return;
                    isResolved = true;
                    mediaElement.removeEventListener('ended', finish);
                    mediaElement.removeEventListener('error', finish);
                    mediaElement.style.display = "none";
                    resolve();
                };

                mediaElement.style.display = "block";
                mediaElement.style.position = "fixed";
                mediaElement.style.top = "50%";
                mediaElement.style.left = "50%";
                mediaElement.style.transform = "translate(-50%, -50%)";
                mediaElement.style.zIndex = "10000";
                mediaElement.style.width = "90vw";
                mediaElement.style.maxWidth = "900px";
                mediaElement.style.height = "auto";
                mediaElement.style.aspectRatio = "16 / 22";
                mediaElement.style.objectFit = "cover";
                mediaElement.style.objectPosition = "top center"; // 👈 將畫面頂住最上，黑邊就會被推出去下面裁走！
                mediaElement.style.backgroundColor = "transparent";
                mediaElement.style.border = "4px solid #d50000"; // 喰種紅色框
                mediaElement.style.boxShadow = "0 0 40px rgba(213, 0, 0, 0.8)";
                mediaElement.style.backgroundColor = "#000";
                mediaElement.style.borderRadius = "10px";

                mediaElement.currentTime = 0;
                mediaElement.addEventListener('ended', finish);
                mediaElement.addEventListener('error', finish);

                mediaElement.play().catch(e => {
                    console.log("自動播放被阻擋或出錯", e);
                    finish();
                });

                // 防卡死：50秒超時強制收埋影片繼續
                setTimeout(finish, 50000);
            });
        }

        class Ghoul999 {
            constructor() {
                this.state = "NORMAL";
                this.session_spins = 0;
                this.session_payout = 0;
                this.session_rush_count = 0;
                this.history = [];
            }

            async play_normal() {
                this.session_spins += 1;

                if (this.session_spins % 100 === 0) {
                    addLog(`現在回轉數: ${this.session_spins}`, "color-normal");
                }

                // 1/999.9 プレミアム大当り
                if (Math.random() < (1 / 999.9)) {
                    addLog(`\n[${this.session_spins} 回轉] 🩸 プレミアム大当り！`, "color-hit");
                    await this.normal_result();
                    return true;
                }

                // 1/538.8 喰種チャージ
                if (Math.random() < (1 / 538.8)) {
                    addLog(`\n[${this.session_spins} 回轉] 喰種チャージ當選！`, "color-charge");

                    // 🌟 0.5% 機率突入 RUSH 機制 🌟
                    if (Math.random() < 0.005) {
                        this.session_payout += 7500; // 👈 直接獲得 7500 玉
                        addLog(`🌈 奇跡！喰種チャージから 7500玉獲得 ＋ RUSH突入！`, "color-ultimate");

                        // 播 Charge 專屬影片
                        rushMedia.src = "https://files.catbox.moe/5q4j7h.mp4";
                        rushMedia.load();

                        addLog(`🎵 播放專屬動畫 (Charge入RUSH) 中... 請稍候`, "color-music");
                        await playVideoPopupAndWait(rushMedia);

                        addLog(`💰 累積出玉: ${this.session_payout} 玉`);
                        updateUI();

                        await sleep(1000);
                        await this.play_rush();
                    } else {
                        this.session_payout += 300; // 👈 失敗時は300玉
                        addLog(`💥 2R 300玉獲得 (通常終了)`);
                        updateUI();
                        this.record_history();
                    }
                    return true;
                }

                return false;
            }

            async normal_result() {
                let r = Math.random();

                if (r < 0.50) {
                    this.session_payout += 7500;
                    addLog("🌈 超プレミアム！ 7500玉獲得 ＋ RUSH突入！", "color-ultimate");
                    addLog(`💰 累積出玉: ${this.session_payout} 玉`);
                    updateUI();

                    await sleep(1000);
                    await this.play_rush();
                } else {
                    this.session_payout += 3000;
                    addLog("😭 3000玉獲得 (通常終了)", "color-normal");
                    addLog(`💰 累積出玉: ${this.session_payout} 玉`);
                    updateUI();
                    this.record_history();
                }
            }

            async play_rush() {
                addLog(`\n===== 🩸 喰MAXループ (ST5回) 開始 =====`, "color-ultimate");
                this.state = "RUSH";
                let st_max = 5;
                let current_st = st_max;
                updateUI();

                while (this.state === "RUSH" && current_st > 0) {
                    await sleep(300);
                    let current_spin = st_max - current_st + 1;

                    document.getElementById("ui-spins").innerText = `RUSH中: ${current_spin}/${st_max}`;

                    // RUSH中 大当り確率: 1/7.7
                    if (Math.random() < (1 / 7.7)) {
                        this.session_rush_count += 1;
                        addLog(`\n🎉 [ST ${current_spin}回転] 當選！ (總 ${this.session_rush_count + 1}連)`, "color-hit");

                        // 🌟 確保轉返原本嘅 Rize 影片 🌟
                        rushMedia.src = "https://files.catbox.moe/t3rubq.mp4";
                        rushMedia.load(); // 👈 🌟 關鍵防卡死：強制載入新影片

                        addLog(`🎵 播放專屬動畫 (rize.mp4) 中... 請稍候`, "color-music");
                        await playVideoPopupAndWait(rushMedia);

                        let payout = 3000;
                        addLog(`💥 3000玉獲得！`, "color-ultimate");

                        let uwanoseCount = 0;

                        // 50% Loop 追加 3000玉
                        while (Math.random() < 0.50) {
                            await sleep(600);
                            payout += 3000;
                            uwanoseCount++;
                            addLog(`🌈 さらに上乗せ！ +3000玉 (計 ${payout}玉)`, "color-ultimate");

                            // 🌟 第3次上乗せ (即係達到 12000玉) 嘅時候播片！
                            if (uwanoseCount === 3) {
                                rushMedia.src = "https://files.catbox.moe/4nkuj0.mp4";
                                rushMedia.load(); // 👈 🌟 關鍵防卡死：強制載入 12000玉影片

                                addLog(`🎵 播放專屬動畫 (12000玉到達) 中... 請稍候`, "color-music");
                                await playVideoPopupAndWait(rushMedia);
                            }
                        }

                        this.session_payout += payout;
                        addLog(`💰 累積出玉: ${this.session_payout} 玉`);
                        addLog("🩸 喰MAXループ 継続!!", "color-rush");

                        current_st = st_max; // ST 回復
                        updateUI();
                        await sleep(800);
                    } else {
                        current_st--;
                    }
                }

                if (current_st === 0) {
                    document.getElementById("ui-spins").innerText = `RUSH中: ${st_max}/${st_max}`;
                    addLog("\n💀 ST抜け... RUSH終了", "color-fall");
                    this.end_rush();
                }
            }

            end_rush() {
                addLog(`📈 總連莊數: ${this.session_rush_count + 1}連 (含初當)`);
                addLog(`💰 最終出玉: ${this.session_payout} 玉`);
                this.state = "NORMAL";
                this.record_history();
                updateUI();
            }

            record_history() {
                this.history.unshift({
                    spins: this.session_spins,
                    rush: this.session_rush_count > 0 ? this.session_rush_count + 1 : 1,
                    payout: this.session_payout
                });

                if (this.history.length > 10) this.history.pop();
                renderHistoryTable(this.history);

                this.session_spins = 0;
                this.session_payout = 0;
                this.session_rush_count = 0;
            }
        }

        let game = new Ghoul999();
        let isPlaying = false;
        const logBox = document.getElementById("log-box");
        const btnPlay = document.getElementById("btn-play");
        const btnReset = document.getElementById("btn-reset");
        const historyTbody = document.getElementById("history-tbody");

        function addLog(text, className = "") {
            const div = document.createElement("div");
            div.className = `log-entry ${className}`;
            div.innerText = text;
            logBox.appendChild(div);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function updateUI() {
            if (game.state === "NORMAL") {
                document.getElementById("ui-spins").innerText = game.session_spins;
            }
            document.getElementById("ui-payout").innerText = game.session_payout;
            document.getElementById("ui-rush").innerText = game.session_rush_count;
        }

        function renderHistoryTable(historyData) {
            historyTbody.innerHTML = "";
            if (historyData.length === 0) {
                historyTbody.innerHTML = `<tr><td colspan="4" class="empty-row">- 無紀錄 -</td></tr>`;
                return;
            }

            historyData.forEach((record, index) => {
                const tr = document.createElement("tr");
                let label = index === 0 ? "前回" : index === 1 ? "前々回" : `${index + 1}回前`;
                tr.innerHTML = `
                    <td>${label}</td>
                    <td class="hit-spins">${record.spins}</td>
                    <td class="hit-rush">${record.rush}</td>
                    <td class="hit-payout">${record.payout}</td>
                `;
                historyTbody.appendChild(tr);
            });
        }

        async function startPlay() {
            if (isPlaying) return;
            isPlaying = true;
            btnPlay.disabled = true;
            btnReset.disabled = true;

            if (!audioUnlocked) {
                rushMedia.load();
                audioUnlocked = true;
            }

            addLog("\n=== ゲーム開始 ===", "color-hit");

            while (isPlaying) {
                let hit = await game.play_normal();
                updateUI();

                if (game.session_spins % 100 === 0) {
                    await sleep(10);
                }

                if (hit) {
                    isPlaying = false;
                    break;
                }
            }

            btnPlay.disabled = false;
            btnReset.disabled = false;
            btnPlay.innerText = "▶️ 繼續抽機";
        }

        function resetGame() {
            game = new Ghoul999();
            logBox.innerHTML = "";
            renderHistoryTable([]);
            updateUI();

            rushMedia.pause();
            rushMedia.currentTime = 0;
            rushMedia.style.display = "none";

            addLog("遊戲紀錄已重置。", "color-normal");
            btnPlay.innerText = "▶️ 遊戲開始";
        }
    </script>
    <script src="plugin.js"></script>
</body>

</html>
