<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>柏青哥模擬器 (P 賭ケグルイ)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d0d0d;
            color: #eeeeee;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #ff1744; text-shadow: 0 0 15px rgba(255, 23, 68, 0.7); font-weight: 900; letter-spacing: 2px; }
        
        .main-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            flex-wrap: wrap;
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .left-panel { flex: 1; min-width: 320px; max-width: 500px; }
        .right-panel { flex: 1; min-width: 320px; max-width: 400px; }

        .stats-board {
            background-color: #1a0000;
            border: 2px solid #ff1744; 
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-around;
            font-size: 1.1em;
            box-shadow: inset 0 0 15px rgba(255, 23, 68, 0.3);
        }
        .stat-item span {
            display: block;
            font-weight: bold;
            color: #ffca28; 
            font-size: 1.3em;
            margin-top: 5px;
        }
        
        button {
            background-color: #b71c1c; 
            color: white;
            border: 1px solid #ff1744;
            padding: 12px 25px;
            font-size: 1.1em;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
            transition: background-color 0.2s, transform 0.1s, box-shadow 0.2s;
        }
        button:hover { background-color: #d50000; transform: scale(1.05); box-shadow: 0 0 10px #ff1744; }
        button:disabled { background-color: #3e2723; border-color: #444; color: #777; cursor: not-allowed; transform: scale(1); box-shadow: none; }
        #btn-reset { background-color: #424242; border-color: #616161; }
        #btn-reset:hover { background-color: #212121; box-shadow: 0 0 10px #616161; }
        
        .log-container {
            background-color: #000000;
            border: 1px solid #b71c1c;
            border-radius: 5px;
            height: 400px;
            overflow-y: auto;
            padding: 10px;
            text-align: left;
            font-family: 'Courier New', Courier, monospace;
            line-height: 1.5;
        }
        .log-entry { margin: 5px 0; }
        .color-rush { color: #ffeb3b; font-weight: bold; text-shadow: 0 0 5px #ffeb3b; }
        .color-hit { color: #ff5252; font-weight: bold; text-shadow: 0 0 5px #ff5252; }
        .color-normal { color: #9e9e9e; }
        .color-ultimate { color: #d50000; font-weight: bold; text-shadow: 0 0 10px #d50000; font-size: 1.1em; }
        .color-fall { color: #757575; font-weight: bold; }
        .color-music { color: #00e676; font-style: italic; }
        .color-judge { color: #e040fb; font-weight: bold; text-shadow: 0 0 5px #e040fb; font-size: 1.1em; }

        .data-lamp-container {
            background-color: #110000;
            border: 3px solid #b71c1c;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 0 15px rgba(213, 0, 0, 0.4);
        }
        .data-lamp-title {
            color: #ff1744;
            margin-top: 0;
            margin-bottom: 15px;
            text-align: center;
            font-family: 'Courier New', Courier, monospace;
            text-shadow: 0 0 5px #ff1744;
            letter-spacing: 2px;
        }
        table.data-lamp {
            width: 100%;
            border-collapse: collapse;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
        }
        table.data-lamp th, table.data-lamp td {
            border: 1px solid #b71c1c;
            padding: 10px 5px;
            text-align: center;
        }
        table.data-lamp th { background-color: #3e2723; color: #ff8a80; font-size: 0.9em; }
        table.data-lamp tr:nth-child(even) { background-color: #210000; }
        table.data-lamp td.hit-spins { color: #ffeb3b; font-weight: bold; }
        table.data-lamp td.hit-rush { color: #00e676; font-weight: bold; }
        table.data-lamp td.hit-payout { color: #ff5252; }
        .empty-row { color: #444 !important; }
    </style>
</head>
<body>

    <h1>🎰 柏青哥模擬器 <br><span style="font-size: 0.5em; color: #ffffff;">P 賭ケグルイ</span></h1>
    
    <video id="jackpot-media" src="https://files.catbox.moe/v5xwb2.mp4" style="display:none;" preload="auto"></video>
    
    <div class="main-container">
        <div class="left-panel">
            <div class="stats-board">
                <div class="stat-item">當前轉數 <span id="ui-spins">0</span></div>
                <div class="stat-item">本次出玉 <span id="ui-payout">0</span></div>
                <div class="stat-item">本次連莊 <span id="ui-rush">0</span></div>
            </div>

            <div style="margin-bottom: 15px;">
                <button id="btn-play" onclick="startPlay()">▶️ 開始狂賭</button>
                <button id="btn-reset" onclick="resetGame()">🔄 紀錄重置</button>
            </div>

            <div class="log-container" id="log-box"></div>
        </div>

        <div class="right-panel">
            <div class="data-lamp-container">
                <h3 class="data-lamp-title">DATA LAMP (最近10次)</h3>
                <table class="data-lamp">
                    <thead>
                        <tr>
                            <th>前次</th>
                            <th>當選回轉數</th>
                            <th>連莊數</th>
                            <th>獲得出玉</th>
                        </tr>
                    </thead>
                    <tbody id="history-tbody">
                        <tr><td colspan="4" class="empty-row">- 無紀錄 -</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const sleep = ms => new Promise(r => setTimeout(r, ms));
        const jackpotMedia = document.getElementById("jackpot-media");
        let audioUnlocked = false; 

        function playMediaAndWait(mediaElement) {
            return new Promise((resolve) => {
                if (!mediaElement) return resolve();
                
                mediaElement.currentTime = 0;
                const onEnded = () => {
                    mediaElement.removeEventListener('ended', onEnded);
                    resolve();
                };
                mediaElement.addEventListener('ended', onEnded);
                
                mediaElement.play().catch(e => {
                    console.log("自動播放被阻擋", e);
                    mediaElement.removeEventListener('ended', onEnded);
                    resolve(); 
                });
            });
        }

        class Kakegurui {
            constructor() {
                this.state = "NORMAL";
                this.session_spins = 0;
                this.session_payout = 0;
                this.session_rush_count = 0;
                this.history = [];
            }

            async play_normal() {
                this.session_spins += 1;

                if (this.session_spins % 100 === 0) {
                    addLog(`現在回轉數: ${this.session_spins}`, "color-normal");
                }

                // 1/204 通常時大当り
                if (Math.random() < (1 / 204)) {
                    addLog(`\n[${this.session_spins} 回轉] 🩸 大當たり！`, "color-hit");
                    
                    addLog(`🎵 播放專屬音效 (kakegurui.mp4) 中... 請稍候`, "color-music");
                    await playMediaAndWait(jackpotMedia);
                    
                    await this.normal_result();
                    return true;
                }
                
                return false;
            }

            async normal_result() {
                let roll = Math.random();

                // 25% 突入 50/50 ジャッジメント
                if (roll < 0.25) {
                    // 入判決前已經保底獲得 1500玉
                    this.session_payout += 1500;
                    addLog("🔥 10R 1500玉獲得！ 50/50ジャッジメント突入！", "color-hit");
                    addLog(`💰 累積出玉: ${this.session_payout} 玉`);

                    addLog("\n⚖️ 50/50ジャッジメント 発生！ (成功率50%)", "color-judge");
                    await sleep(1500); 
                    
                    let judge = Math.random();
                    if (judge < 0.50) {
                        // 成功: 額外追加 7500玉 (即共 9000玉) + ツラヌキチャレンジ
                        addLog("🌈 狂気の沙汰！ ジャッジメント成功！！", "color-ultimate");

                        this.session_payout += 7500;
                        addLog("💥 絶対王政BONUS 7500玉獲得！", "color-ultimate");
                        addLog(`💰 累積出玉: ${this.session_payout} 玉`);
                        
                        updateUI();
                        await sleep(1000);

                        await this.play_tsuranuki();
                        await this.play_rush();
                    } else {
                        // 失敗: 額外追加 1500玉 (即共 3000玉) -> 通常終了
                        addLog("💀 ジャッジメント失敗... (運否天賦BONUS)", "color-fall");
                        
                        this.session_payout += 1500;
                        addLog("😭 10R 1500玉獲得 (通常終了)");
                        addLog(`💰 累積出玉: ${this.session_payout} 玉`);
                        
                        this.record_history();
                    }
                } 
                // 75% 未觸發判決 (300玉)
                else {
                    this.session_payout += 300;
                    addLog("😭 2R 300玉獲得 (通常終了)");
                    addLog(`💰 累積出玉: ${this.session_payout} 玉`);
                    this.record_history();
                }
                updateUI();
            }

            // ツラヌキチャレンジ (30% Loop) - 失敗保底 1500玉
            async play_tsuranuki() {
                let inTsuranuki = true;
                let loopCount = 1;
                while(inTsuranuki) {
                    addLog(`\n⚔️ ツラヌキチャレンジ 発生！ (成功率30%)`, "color-judge");
                    await sleep(1200);

                    if (Math.random() < 0.30) {
                        // 30% 成功：7500玉上乗せ！ 繼續 Loop
                        this.session_payout += 7500;
                        addLog(`🌈 成功！ 絶対王政BONUS 7500玉上乗せ！！ (ループ ${loopCount}回目)`, "color-ultimate");
                        addLog(`💰 累積出玉: ${this.session_payout} 玉`);
                        
                        this.check_and_play_media(7500);
                        updateUI();
                        loopCount++;
                        await sleep(1500);
                    } else {
                        // 70% 失敗：保底獲得 1500玉！ 結束 Loop
                        this.session_payout += 1500;
                        addLog(`💨 チャレンジ終了... 1500玉獲得 して 絶対王政RUSH BURSTへ`, "color-normal");
                        addLog(`💰 累積出玉: ${this.session_payout} 玉`);
                        
                        this.check_and_play_media(1500);
                        updateUI();
                        inTsuranuki = false;
                        await sleep(1000);
                    }
                }
            }

            async play_rush() {
                addLog(`\n===== 👑 絶対王政RUSH BURST (ST135回) 開始 =====`, "color-ultimate");
                this.state = "RUSH";
                let st_max = 135;
                let current_st = st_max;
                updateUI();

                while (this.state === "RUSH" && current_st > 0) {
                    await sleep(30);
                    let current_spin = st_max - current_st + 1;
                    
                    document.getElementById("ui-spins").innerText = `RUSH中: ${current_spin}/${st_max}`;

                    // RUSH中 大当り確率: 1/99
                    if (Math.random() < (1 / 99)) {
                        this.session_rush_count += 1;
                        addLog(`\n🎉 [ST ${current_spin}回転] 當選！ (總 ${this.session_rush_count + 1}連)`, "color-hit");

                        // 獲得 1500玉 狂喜乱舞BONUS
                        this.session_payout += 1500;
                        addLog(`💥 狂喜乱舞BONUS 1500玉獲得！`);
                        this.check_and_play_media(1500);
                        updateUI();
                        await sleep(800);

                        // 60% 觸發運命の一撃
                        addLog(`🔮 運命の一撃 発生あおり...`, "color-normal");
                        await sleep(1000);

                        if (Math.random() < 0.60) {
                            addLog(`🔥 運命の一撃 成功！ ツラヌキチャレンジ突入！`, "color-hit");
                            await sleep(500);
                            await this.play_tsuranuki();
                        } else {
                            addLog(`💨 運命の一撃 失敗... ST継続`, "color-normal");
                        }

                        addLog(`💰 累積出玉: ${this.session_payout} 玉`);
                        addLog("👑 絶対王政RUSH BURST 継続!!", "color-rush");
                        
                        current_st = st_max; // ST 回復
                        updateUI();
                        await sleep(800);
                    } else {
                        current_st--;
                    }
                }

                if (current_st === 0) {
                    document.getElementById("ui-spins").innerText = `RUSH中: ${st_max}/${st_max}`;
                    addLog("\n💀 ST抜け... RUSH終了");
                    this.end_rush();
                }
            }

            end_rush() {
                addLog(`📈 總連莊數: ${this.session_rush_count + 1}連 (含初當)`);
                addLog(`💰 最終出玉: ${this.session_payout} 玉`);
                this.state = "NORMAL";
                this.record_history();
                updateUI();
            }

            check_and_play_media(payout) {
                if (payout >= 1500) {
                    if (jackpotMedia.paused || jackpotMedia.ended) {
                        jackpotMedia.currentTime = 0; 
                        jackpotMedia.play().catch(e => {
                            console.log("瀏覽器阻擋自動播放", e);
                        });
                    }
                }
            }

            record_history() {
                this.history.unshift({
                    spins: this.session_spins,
                    rush: this.session_rush_count > 0 ? this.session_rush_count + 1 : 1,
                    payout: this.session_payout
                });

                if (this.history.length > 10) this.history.pop();
                renderHistoryTable(this.history);

                this.session_spins = 0;
                this.session_payout = 0;
                this.session_rush_count = 0;
            }
        }

        let game = new Kakegurui();
        let isPlaying = false;
        const logBox = document.getElementById("log-box");
        const btnPlay = document.getElementById("btn-play");
        const btnReset = document.getElementById("btn-reset");
        const historyTbody = document.getElementById("history-tbody");

        function addLog(text, className = "") {
            const div = document.createElement("div");
            div.className = `log-entry ${className}`;
            div.innerText = text;
            logBox.appendChild(div);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function updateUI() {
            if (game.state === "NORMAL") {
                document.getElementById("ui-spins").innerText = game.session_spins;
            }
            document.getElementById("ui-payout").innerText = game.session_payout;
            document.getElementById("ui-rush").innerText = game.session_rush_count;
        }

        function renderHistoryTable(historyData) {
            historyTbody.innerHTML = ""; 
            if (historyData.length === 0) {
                historyTbody.innerHTML = `<tr><td colspan="4" class="empty-row">- 無紀錄 -</td></tr>`;
                return;
            }

            historyData.forEach((record, index) => {
                const tr = document.createElement("tr");
                let label = index === 0 ? "前回" : index === 1 ? "前々回" : `${index + 1}回前`;
                tr.innerHTML = `
                    <td>${label}</td>
                    <td class="hit-spins">${record.spins}</td>
                    <td class="hit-rush">${record.rush}</td>
                    <td class="hit-payout">${record.payout}</td>
                `;
                historyTbody.appendChild(tr);
            });
        }

        async function startPlay() {
            if (isPlaying) return;
            isPlaying = true;
            btnPlay.disabled = true;
            btnReset.disabled = true;
            
            if (!audioUnlocked) {
                jackpotMedia.load(); 
                audioUnlocked = true;
            }
            
            addLog("\n=== さァ、賭け狂いましょう！ ===", "color-hit");

            while (isPlaying) {
                let hit = await game.play_normal();
                updateUI();
                
                if (game.session_spins % 100 === 0) {
                    await sleep(10); 
                }

                if (hit) {
                    isPlaying = false;
                    break;
                }
            }
            
            btnPlay.disabled = false;
            btnReset.disabled = false;
            btnPlay.innerText = "▶️ 繼續狂賭";
        }

        function resetGame() {
            game = new Kakegurui();
            logBox.innerHTML = "";
            renderHistoryTable([]);
            updateUI();
            
            jackpotMedia.pause();
            jackpotMedia.currentTime = 0;
            
            addLog("遊戲紀錄已重置。", "color-normal");
            btnPlay.innerText = "▶️ 開始狂賭";
        }
    </script>
    <script src="plugin.js"></script>
</body>
</html>
