<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>柏青哥模擬器 (P 転生したらスライムだった件)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1117;
            color: #e0e0e0;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #00bcd4; text-shadow: 0 0 15px rgba(0, 188, 212, 0.7); }
        
        .main-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            flex-wrap: wrap;
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .left-panel { flex: 1; min-width: 320px; max-width: 500px; }
        .right-panel { flex: 1; min-width: 320px; max-width: 400px; }

        .stats-board {
            background-color: #161b22;
            border: 2px solid #0288d1; 
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-around;
            font-size: 1.1em;
            box-shadow: inset 0 0 15px rgba(2, 136, 209, 0.5);
        }
        .stat-item span {
            display: block;
            font-weight: bold;
            color: #4fc3f7; 
            font-size: 1.3em;
            margin-top: 5px;
        }
        
        button {
            background-color: #0288d1; 
            color: white;
            border: 1px solid #00bcd4;
            padding: 12px 25px;
            font-size: 1.1em;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
            transition: background-color 0.2s, box-shadow 0.2s;
        }
        button:hover { background-color: #0277bd; box-shadow: 0 0 10px #00bcd4; }
        button:disabled { background-color: #21262d; border-color: #444; color: #777; cursor: not-allowed; box-shadow: none; }
        #btn-reset { background-color: #424242; border-color: #616161; }
        #btn-reset:hover { background-color: #212121; box-shadow: 0 0 10px #616161; }
        
        .log-container {
            background-color: #000000;
            border: 1px solid #0277bd;
            border-radius: 5px;
            height: 400px;
            overflow-y: auto;
            padding: 10px;
            text-align: left;
            font-family: 'Courier New', Courier, monospace;
            line-height: 1.5;
        }
        .log-entry { margin: 5px 0; }
        .color-rush { color: #29b6f6; font-weight: bold; text-shadow: 0 0 5px #29b6f6; }
        .color-hit { color: #ffeb3b; font-weight: bold; }
        .color-normal { color: #9e9e9e; }
        .color-ultimate { color: #ffca28; font-weight: bold; text-shadow: 0 0 10px #ffca28; font-size: 1.1em; }
        .color-jitan { color: #ab47bc; font-weight: bold; }
        .color-ctime { color: #ff5252; font-style: italic; }
        .color-charge { color: #9c27b0; font-weight: bold; } /* 新增 Charge 顏色 */

        .data-lamp-container {
            background-color: #0a0c10;
            border: 3px solid #0288d1;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 0 15px rgba(2, 136, 209, 0.4); 
        }
        .data-lamp-title {
            color: #00bcd4;
            margin-top: 0;
            margin-bottom: 15px;
            text-align: center;
            font-family: 'Courier New', Courier, monospace;
            text-shadow: 0 0 5px #00bcd4;
            letter-spacing: 2px;
        }
        table.data-lamp {
            width: 100%;
            border-collapse: collapse;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
        }
        table.data-lamp th, table.data-lamp td {
            border: 1px solid #0277bd;
            padding: 10px 5px;
            text-align: center;
        }
        table.data-lamp th { background-color: #01579b; color: #4fc3f7; font-size: 0.9em; }
        table.data-lamp tr:nth-child(even) { background-color: #0d1117; }
        table.data-lamp td.hit-spins { color: #ffeb3b; font-weight: bold; }
        table.data-lamp td.hit-rush { color: #00e676; font-weight: bold; }
        table.data-lamp td.hit-payout { color: #ff5252; }
        .empty-row { color: #555 !important; }
    </style>
</head>
<body>

    <h1>🎰 柏青哥模擬器 <br><span style="font-size: 0.6em; color: #4fc3f7;">P 転生したらスライムだった件</span></h1>
    
    <div class="main-container">
        <div class="left-panel">
            <div class="stats-board">
                <div class="stat-item">當前轉數 <span id="ui-spins">0</span></div>
                <div class="stat-item">本次出玉 <span id="ui-payout">0</span></div>
                <div class="stat-item">本次連莊 <span id="ui-rush">0</span></div>
            </div>

            <div style="margin-bottom: 15px;">
                <button id="btn-play" onclick="startPlay()">▶️ 開始抽機</button>
                <button id="btn-reset" onclick="resetGame()">🔄 紀錄重置</button>
            </div>

            <div class="log-container" id="log-box"></div>
        </div>

        <div class="right-panel">
            <div class="data-lamp-container">
                <h3 class="data-lamp-title">DATA LAMP (最近10次)</h3>
                <table class="data-lamp">
                    <thead>
                        <tr>
                            <th>前次</th>
                            <th>當選回轉数</th>
                            <th>連莊數</th>
                            <th>獲得出玉</th>
                        </tr>
                    </thead>
                    <tbody id="history-tbody">
                        <tr><td colspan="4" class="empty-row">- 無紀錄 -</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const sleep = ms => new Promise(r => setTimeout(r, ms));

        class SlimeMachine {
            constructor() {
                this.state = "NORMAL";
                this.session_spins = 0;
                this.session_payout = 0;
                this.session_rush_count = 0;
                this.history = [];
            }

            async play_normal() {
                this.session_spins += 1;

                if (this.session_spins % 100 === 0) {
                    addLog(`現在回轉數: ${this.session_spins}`, "color-normal");
                }

                // 1. 1/399.9 図柄揃い
                if (Math.random() < (1 / 399.9)) {
                    addLog(`\n[${this.session_spins} 回轉] 🔥 図柄揃い大当り！`, "color-hit");
                    await this.normal_result();
                    return true;
                }
                
                // 2. 1/2800 転スラチャージ (Charge小當)
                if (Math.random() < (1 / 2800)) {
                    addLog(`\n[${this.session_spins} 回轉] ⚡ 転スラチャージ當選！`, "color-charge");
                    this.session_payout += 300;
                    addLog(`💥 2R 300玉獲得 (通常終了)`);
                    
                    updateUI();
                    this.record_history();
                    return true; 
                }
                
                return false;
            }

            async normal_result() {
                let roll = Math.random();

                // 50% 1500個-A -> LT直行
                if (roll < 0.50) {
                    let payout = 1500;
                    addLog("🌈 1500玉獲得！ LT『開国祭』直行！！", "color-rush");
                    this.session_payout += payout;
                    await sleep(1000);
                    await this.play_lt("NORMAL");
                } 
                // 50% 1500個-B -> 時短100回
                else {
                    let payout = 1500;
                    addLog("🛡️ 1500玉獲得... 『開国祭(時短100回)』へ", "color-jitan");
                    this.session_payout += payout;
                    await sleep(1000);
                    await this.play_jitan();
                }
            }

            async play_jitan() {
                addLog("\n===== 🛡️ 開国祭 (時短100回) 開始 =====", "color-jitan");
                this.state = "JITAN";
                updateUI();

                for(let i=1; i<=100; i++) {
                    await sleep(30);
                    document.getElementById("ui-spins").innerText = `時短中: ${i}/100`;
                    
                    if (Math.random() < (1 / 399.9)) {
                        this.session_rush_count += 1;
                        addLog(`\n🎉 [時短 ${i}回転] 引き戻し成功！！`, "color-hit");
                        
                        let payout = 3000;
                        this.session_payout += payout;
                        addLog(`💥 3000玉獲得！`);
                        
                        if (Math.random() < 0.50) {
                            addLog("👑 さらに覚醒！ 超開国祭(LT) へ突入！！", "color-ultimate");
                            await sleep(1000);
                            await this.play_lt("SUPER");
                        } else {
                            addLog("⚡ 開国祭(LT) へ突入！", "color-rush");
                            await sleep(1000);
                            await this.play_lt("NORMAL");
                        }
                        return;
                    }
                }

                document.getElementById("ui-spins").innerText = `時短中: 100/100`;
                addLog("\n💀 時短引き戻しならず... 終了");
                this.end_rush();
            }

            async play_lt(mode) {
                this.state = "RUSH";
                let st_max = mode === "SUPER" ? 160 : 135;
                let mode_name = mode === "SUPER" ? "超開国祭(LT)" : "開国祭(LT)";
                addLog(`\n===== 🌟 ${mode_name} (ST${st_max}回) 開始 =====`, "color-ultimate");
                updateUI();

                let current_st = st_max;

                while (this.state === "RUSH" && current_st > 0) {
                    await sleep(30);
                    let current_spin = st_max - current_st + 1;
                    document.getElementById("ui-spins").innerText = `LT中: ${current_spin}/${st_max}`;

                    // 大当り・c時短 確率 1/99.1
                    if (Math.random() < (1 / 99.1)) {
                        this.session_rush_count += 1;
                        addLog(`\n🎉 [ST ${current_spin}回転] 當選！ (總 ${this.session_rush_count + 1}連)`, "color-hit");

                        if (mode === "NORMAL") {
                            // 50% 升級超開国祭 (c時短，無出玉)
                            if (Math.random() < 0.50) {
                                mode = "SUPER";
                                st_max = 160;
                                addLog(`🌈 c時短當選！ 出玉なしで『超開国祭(LT)』へ昇格！！ (ST160回)`, "color-ultimate");
                            } else {
                                // 50% 3000玉大当り
                                this.session_payout += 3000;
                                addLog(`💥 3000玉獲得 (10R x 2)！ 開国祭(LT) 継続！`, "color-rush");
                            }
                        } else {
                            // SUPER MODE
                            // 約1/793 (約 12.5%) 降級開国祭 (c時短，無出玉)
                            if (Math.random() < (99.1 / 793)) {
                                mode = "NORMAL";
                                st_max = 135;
                                addLog(`⚠️ c時短當選... 出玉なしで『開国祭(LT)』へ降格... (ST135回)`, "color-ctime");
                            } else {
                                // 剩餘 87.5% 3000玉大当り
                                this.session_payout += 3000;
                                addLog(`👑 3000玉獲得 (10R x 2)！ 超開国祭(LT) 継続！！`, "color-ultimate");
                            }
                        }
                        
                        addLog(`💰 累積出玉: ${this.session_payout} 玉`);
                        current_st = st_max; // Reset ST
                        updateUI();
                        await sleep(800);
                    } else {
                        current_st--;
                    }
                }

                if (current_st === 0) {
                    document.getElementById("ui-spins").innerText = `LT中: ${st_max}/${st_max}`;
                    addLog("\n💀 ST抜け... RUSH終了");
                    this.end_rush();
                }
            }

            end_rush() {
                addLog(`📈 總連莊數: ${this.session_rush_count + 1}連 (含初當)`);
                addLog(`💰 最終出玉: ${this.session_payout} 玉`);
                this.state = "NORMAL";
                this.record_history();
                updateUI();
            }

            record_history() {
                this.history.unshift({
                    spins: this.session_spins,
                    rush: this.session_rush_count > 0 ? this.session_rush_count + 1 : 1,
                    payout: this.session_payout
                });

                if (this.history.length > 10) this.history.pop();
                renderHistoryTable(this.history);

                this.session_spins = 0;
                this.session_payout = 0;
                this.session_rush_count = 0;
            }
        }

        let game = new SlimeMachine();
        let isPlaying = false;
        const logBox = document.getElementById("log-box");
        const btnPlay = document.getElementById("btn-play");
        const btnReset = document.getElementById("btn-reset");
        const historyTbody = document.getElementById("history-tbody");

        function addLog(text, className = "") {
            const div = document.createElement("div");
            div.className = `log-entry ${className}`;
            div.innerText = text;
            logBox.appendChild(div);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function updateUI() {
            if (game.state === "NORMAL") {
                document.getElementById("ui-spins").innerText = game.session_spins;
            }
            document.getElementById("ui-payout").innerText = game.session_payout;
            document.getElementById("ui-rush").innerText = game.session_rush_count;
        }

        function renderHistoryTable(historyData) {
            historyTbody.innerHTML = ""; 
            if (historyData.length === 0) {
                historyTbody.innerHTML = `<tr><td colspan="4" class="empty-row">- 無紀錄 -</td></tr>`;
                return;
            }

            historyData.forEach((record, index) => {
                const tr = document.createElement("tr");
                let label = index === 0 ? "前回" : index === 1 ? "前々回" : `${index + 1}回前`;
                tr.innerHTML = `
                    <td>${label}</td>
                    <td class="hit-spins">${record.spins}</td>
                    <td class="hit-rush">${record.rush}</td>
                    <td class="hit-payout">${record.payout}</td>
                `;
                historyTbody.appendChild(tr);
            });
        }

        async function startPlay() {
            if (isPlaying) return;
            isPlaying = true;
            btnPlay.disabled = true;
            btnReset.disabled = true;
            
            addLog("\n=== 開始打玉 ===", "color-hit");

            while (isPlaying) {
                let hit = await game.play_normal();
                updateUI();
                
                if (game.session_spins % 100 === 0) {
                    await sleep(10); 
                }

                if (hit) {
                    isPlaying = false;
                    break;
                }
            }
            
            btnPlay.disabled = false;
            btnReset.disabled = false;
            btnPlay.innerText = "▶️ 繼續抽機";
        }

        function resetGame() {
            game = new SlimeMachine();
            logBox.innerHTML = "";
            renderHistoryTable([]);
            updateUI();
            addLog("遊戲紀錄已重置。", "color-normal");
            btnPlay.innerText = "▶️ 開始抽機";
        }
    </script>
    
    <!-- 自動掛載你嘅 Plugin -->
    <script src="plugin.js"></script>
</body>
</html>
