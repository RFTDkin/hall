<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>柏青哥模擬器 (e DMDP 魂神9000)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #ffeb3b; }
        
        .main-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            flex-wrap: wrap;
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .left-panel { flex: 1; min-width: 320px; max-width: 500px; }
        .right-panel { flex: 1; min-width: 320px; max-width: 400px; }

        .stats-board {
            background-color: #1e1e1e;
            border: 2px solid #8e24aa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-around;
            font-size: 1.1em;
        }
        .stat-item span {
            display: block;
            font-weight: bold;
            color: #4caf50;
            font-size: 1.3em;
            margin-top: 5px;
        }
        
        button {
            background-color: #9c27b0;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1.1em;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
            transition: background-color 0.2s;
        }
        button:hover { background-color: #7b1fa2; }
        button:disabled { background-color: #555; cursor: not-allowed; }
        #btn-reset { background-color: #2196f3; }
        #btn-reset:hover { background-color: #0b7dda; }
        
        .log-container {
            background-color: #000000;
            border: 1px solid #333;
            border-radius: 5px;
            height: 400px;
            overflow-y: auto;
            padding: 10px;
            text-align: left;
            font-family: 'Courier New', Courier, monospace;
            line-height: 1.5;
        }
        .log-entry { margin: 5px 0; }
        .color-rush { color: #ffeb3b; font-weight: bold; }
        .color-hit { color: #ff5252; font-weight: bold; }
        .color-normal { color: #b0bec5; }
        .color-konshin { color: #e040fb; font-weight: bold; text-shadow: 0 0 5px #e040fb; }
        .color-vstock { color: #00e5ff; font-weight: bold; text-shadow: 0 0 8px #00e5ff; }

        .data-lamp-container {
            background-color: #111;
            border: 3px solid #444;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 0 15px rgba(142, 36, 170, 0.3);
        }
        .data-lamp-title {
            color: #e040fb;
            margin-top: 0;
            margin-bottom: 15px;
            text-align: center;
            font-family: 'Courier New', Courier, monospace;
            text-shadow: 0 0 5px #e040fb;
            letter-spacing: 2px;
        }
        table.data-lamp {
            width: 100%;
            border-collapse: collapse;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
        }
        table.data-lamp th, table.data-lamp td {
            border: 1px solid #333;
            padding: 10px 5px;
            text-align: center;
        }
        table.data-lamp th { background-color: #222; color: #e040fb; font-size: 0.9em; }
        table.data-lamp tr:nth-child(even) { background-color: #1a1a1a; }
        table.data-lamp td.hit-spins { color: #ff5252; font-weight: bold; }
        table.data-lamp td.hit-rush { color: #00e676; font-weight: bold; }
        table.data-lamp td.hit-payout { color: #ffeb3b; }
        .empty-row { color: #555 !important; }
    </style>
</head>
<body>

    <h1>🎰 柏青哥模擬器 <br><span style="font-size: 0.6em; color: #e040fb;">eフィーバー デッドマウント・デスプレイ 魂神9000</span></h1>
    
    <video id="jackpot-media" src="3000_bonus.mp4" style="display:none;" preload="auto"></video>
    
    <div class="main-container">
        <div class="left-panel">
            <div class="stats-board">
                <div class="stat-item">當前轉數 <span id="ui-spins">0</span></div>
                <div class="stat-item">本次出玉 <span id="ui-payout">0</span></div>
                <div class="stat-item">本次連莊 <span id="ui-rush">0</span></div>
            </div>

            <div style="margin-bottom: 15px;">
                <button id="btn-play" onclick="startPlay()">▶️ 開始抽機</button>
                <button id="btn-reset" onclick="resetGame()">🔄 紀錄重置</button>
            </div>

            <div class="log-container" id="log-box"></div>
        </div>

        <div class="right-panel">
            <div class="data-lamp-container">
                <h3 class="data-lamp-title">DATA LAMP (最近10次)</h3>
                <table class="data-lamp">
                    <thead>
                        <tr>
                            <th>前次</th>
                            <th>當選回轉數</th>
                            <th>連莊數</th>
                            <th>獲得出玉</th>
                        </tr>
                    </thead>
                    <tbody id="history-tbody">
                        <tr><td colspan="4" class="empty-row">- 無紀錄 -</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const sleep = ms => new Promise(r => setTimeout(r, ms));
        const jackpotMedia = document.getElementById("jackpot-media");
        let audioUnlocked = false; 

        class DeadMountDeathPlay {
            constructor() {
                this.state = "NORMAL";
                this.session_spins = 0;
                this.session_payout = 0;
                this.session_rush_count = 0;
                this.history = [];
            }

            async play_normal() {
                this.session_spins += 1;

                if (this.session_spins % 100 === 0) {
                    addLog(`現在回轉數: ${this.session_spins}`, "color-normal");
                }

                // 1/349.9
                if (Math.random() < (1 / 349.9)) {
                    addLog(`\n[${this.session_spins} 回轉] 🔥 大當たり！`, "color-hit");
                    await this.normal_result();
                    return true;
                }
                return false;
            }

            async normal_result() {
                let roll = Math.random();

                // 51% 突入屍RUSH
                if (roll < 0.51) {
                    let payout = 1500;
                    addLog("🌈 1500玉 + 屍RUSH 突入！", "color-rush");
                    this.session_payout += payout;
                    await this.play_shikabane_rush();
                } 
                // 49% 通常終了
                else {
                    let payout = 1500;
                    addLog("😭 1500玉 (通常終了)");
                    this.session_payout += payout;
                    addLog(`💰 本次總出玉: ${this.session_payout} 玉`);
                    this.record_history();
                }
                updateUI();
            }

            // 第一階段：屍RUSH
            async play_shikabane_rush() {
                addLog("\n===== 屍RUSH 開始 =====", "color-rush");
                this.state = "SHIKABANE_RUSH";
                let shikabane_win_count = 0;
                updateUI();

                while (this.state === "SHIKABANE_RUSH") {
                    await sleep(800);
                    
                    // 轉落抽籤：大當(1/43) vs 転落(1/148)
                    if (Math.random() < (148 / 191)) {
                        shikabane_win_count += 1;
                        this.session_rush_count += 1;
                        
                        let payout = 3000;
                        this.session_payout += payout;

                        addLog(`\n🎉 屍RUSH #${shikabane_win_count} (總 ${this.session_rush_count}連)`, "color-rush");
                        addLog(`💥 本次獲得: 3000 玉`);
                        addLog(`💰 累積出玉: ${this.session_payout} 玉`);

                        this.check_and_play_media(payout);
                        updateUI();
                        
                        // 屍RUSH中獎2次 -> 升級魂神
                        if (shikabane_win_count >= 2) {
                            addLog("🔥 屍RUSH 2回継続達成！ 『魂神の一撃』へ突入！！", "color-konshin");
                            await sleep(1500); 
                            await this.play_konshin();
                            break;
                        } else {
                            addLog("⚡ 屍RUSH繼續!! (下一次中獎即入魂神)", "color-rush");
                        }
                    } else {
                        addLog("\n💀 転落... 屍RUSH終了");
                        addLog(`📈 總連莊數: ${this.session_rush_count + 1}連 (含初當)`);
                        addLog(`💰 最終出玉: ${this.session_payout} 玉`);
                        
                        this.state = "NORMAL";
                        this.record_history();
                        updateUI();
                        break;
                    }
                }
            }

            // 第二階段：魂神の一撃
            async play_konshin() {
                addLog("\n===== 魂神の一撃 開始 =====", "color-konshin");
                this.state = "KONSHIN";
                let konshin_hits = 0;
                let v_stock = 0; // 新增：用來追蹤有無抽中 3% 嘅 V-STOCK
                updateUI();

                while (this.state === "KONSHIN") {
                    await sleep(1000);
                    
                    let is_win = false;

                    // 如果手頭上有 V-STOCK，直接跳過 50% 判定
                    if (v_stock > 0) {
                        addLog("\n🔮 魂神の一撃 (V-STOCK消費) ジャッジメント...", "color-normal");
                        await sleep(1000);
                        addLog("⚡ V-STOCK 発動！ 次回大当り濃厚！！", "color-vstock");
                        v_stock--;
                        is_win = true;
                    } else {
                        addLog("\n🔮 魂神の一撃 1回転ジャッジメント...", "color-normal");
                        await sleep(1000);
                        // 無 V-STOCK 就硬食 50% 成功率
                        if (Math.random() < 0.50) {
                            is_win = true;
                        }
                    }

                    if (is_win) {
                        this.session_rush_count += 1;
                        konshin_hits += 1;
                        
                        // 抽獎分配 (出玉)
                        let roll = Math.random();
                        let payout = 0;

                        if (roll < 0.03) {
                            payout = 9000;
                            v_stock++; // 獲得一個 V-STOCK
                            addLog(`🌈 超極限！ 9000玉 + V-STOCK(次回濃厚) 獲得 !!!`, "color-vstock");
                        } 
                        else if (roll < 0.03 + 0.47) {
                            payout = 9000;
                            addLog(`💎 爆裂！ 9000玉 !!!`, "color-hit");
                        } 
                        else {
                            payout = 3000;
                            addLog(`✨ 3000玉 !`, "color-rush");
                        }

                        this.session_payout += payout;

                        addLog(`🎉 魂神の一撃 成功！ (#${konshin_hits}回目)`, "color-konshin");
                        addLog(`💥 本次獲得: ${payout} 玉`);
                        addLog(`💰 累積出玉: ${this.session_payout} 玉`);
                        
                        if (v_stock > 0) {
                            addLog("⚡ 魂神の一撃 継続!! (V-STOCK保留中)", "color-vstock");
                        } else {
                            addLog("⚡ 魂神の一撃 継続!!", "color-rush");
                        }

                        this.check_and_play_media(payout);
                        updateUI();
                    } else {
                        addLog("\n💀 魂神の一撃 失敗...");
                        addLog(`📈 總連莊數: ${this.session_rush_count + 1}連 (含初當)`);
                        addLog(`💰 最終出玉: ${this.session_payout} 玉`);
                        
                        this.state = "NORMAL";
                        this.record_history();
                        updateUI();
                        break;
                    }
                }
            }

            check_and_play_media(payout) {
                if (payout >= 3000) {
                    if (jackpotMedia.paused || jackpotMedia.ended) {
                        jackpotMedia.currentTime = 0; 
                        jackpotMedia.play().catch(e => {
                            console.log("瀏覽器阻擋自動播放", e);
                        });
                    }
                }
            }

            record_history() {
                this.history.unshift({
                    spins: this.session_spins,
                    rush: this.session_rush_count > 0 ? this.session_rush_count + 1 : 1,
                    payout: this.session_payout
                });

                if (this.history.length > 10) this.history.pop();
                renderHistoryTable(this.history);

                this.session_spins = 0;
                this.session_payout = 0;
                this.session_rush_count = 0;
            }
        }

        let game = new DeadMountDeathPlay();
        let isPlaying = false;
        const logBox = document.getElementById("log-box");
        const btnPlay = document.getElementById("btn-play");
        const btnReset = document.getElementById("btn-reset");
        const historyTbody = document.getElementById("history-tbody");

        function addLog(text, className = "") {
            const div = document.createElement("div");
            div.className = `log-entry ${className}`;
            div.innerText = text;
            logBox.appendChild(div);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function updateUI() {
            document.getElementById("ui-spins").innerText = game.session_spins;
            document.getElementById("ui-payout").innerText = game.session_payout;
            document.getElementById("ui-rush").innerText = game.session_rush_count;
        }

        function renderHistoryTable(historyData) {
            historyTbody.innerHTML = ""; 
            if (historyData.length === 0) {
                historyTbody.innerHTML = `<tr><td colspan="4" class="empty-row">- 無紀錄 -</td></tr>`;
                return;
            }

            historyData.forEach((record, index) => {
                const tr = document.createElement("tr");
                let label = index === 0 ? "前回" : index === 1 ? "前々回" : `${index + 1}回前`;
                tr.innerHTML = `
                    <td>${label}</td>
                    <td class="hit-spins">${record.spins}</td>
                    <td class="hit-rush">${record.rush}</td>
                    <td class="hit-payout">${record.payout}</td>
                `;
                historyTbody.appendChild(tr);
            });
        }

        async function startPlay() {
            if (isPlaying) return;
            isPlaying = true;
            btnPlay.disabled = true;
            btnReset.disabled = true;
            
            if (!audioUnlocked) {
                jackpotMedia.load(); 
                audioUnlocked = true;
            }
            
            addLog("\n=== 開始打玉 ===", "color-hit");

            while (isPlaying) {
                let hit = await game.play_normal();
                updateUI();
                
                if (game.session_spins % 100 === 0) {
                    await sleep(10); 
                }

                if (hit) {
                    isPlaying = false;
                    break;
                }
            }
            
            btnPlay.disabled = false;
            btnReset.disabled = false;
            btnPlay.innerText = "▶️ 繼續抽機";
        }

        function resetGame() {
            game = new DeadMountDeathPlay();
            logBox.innerHTML = "";
            renderHistoryTable([]);
            updateUI();
            
            jackpotMedia.pause();
            jackpotMedia.currentTime = 0;
            
            addLog("遊戲紀錄已重置。", "color-normal");
            btnPlay.innerText = "▶️ 開始抽機";
        }
    </script>
    <script src="plugin.js"></script>
</body>
</html>
